name: 'Build Documenter.jl site'
author: 'JuliaSpacePhysics'
description: 'Build and deploy Documenter.jl site, with a JuliaSpacePhysics navbar'

inputs:
  codecov_token:
    description: 'Codecov upload token; when set, instrument the docs build and upload coverage (flag `docs`)'
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        clean: false
    - uses: julia-actions/setup-julia@v3
      with:
        version: '1'
    - uses: julia-actions/cache@v3
    - name: Configure doc environment
      shell: julia --project=docs --color=yes {0}
      run: |
        using Pkg
        Pkg.develop(PackageSpec(path=pwd()))
        Pkg.instantiate()
    - uses: julia-actions/julia-buildpkg@v1
    - name: Build and deploy docs
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        cov=""
        [[ -n "${{ inputs.codecov_token }}" ]] && cov="--code-coverage=@$PWD"
        julia $cov --color=yes --project=docs docs/make.jl
    - uses: julia-actions/julia-processcoverage@v1
      if: ${{ inputs.codecov_token != '' }}
    - uses: codecov/codecov-action@v7
      if: ${{ inputs.codecov_token != '' }}
      with:
        files: lcov.info
        flags: docs
        token: ${{ inputs.codecov_token }}
    - name: Checkout gh-pages branch
      if: ${{ github.event_name != 'pull_request' }}
      uses: actions/checkout@v7
      with:
        ref: gh-pages
        path: gh-pages
    - name: Insert navbar
      if: ${{ github.event_name != 'pull_request' }}
      uses: TuringLang/actions/DocsNav@main
      with:
        doc-path: "gh-pages"
        navbar-url: "https://raw.githubusercontent.com/JuliaSpacePhysics/juliaspacephysics.github.io/refs/heads/main/ecosystem/Navbar.html"
    - name: Commit and push changes
      if: ${{ github.event_name != 'pull_request' }}
      shell: bash
      working-directory: gh-pages
      run: |
        if [[ -n $(git status -s) ]]; then
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Update navbar (automated)"
          git push
        else
          echo "No changes to commit"
        fi  